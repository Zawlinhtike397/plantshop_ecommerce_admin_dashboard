name: plantfiy_plantshop_admin_dashboard
description: "A new Flutter project."

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_dotenv: ^6.0.0
  iconsax: ^0.0.8
  flutter_bloc: ^9.1.1
  supabase_flutter: ^2.12.2
  go_router: ^17.0.0
